name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repository layout
        shell: pwsh
        run: |
          $required = @('models', 'data', 'tests', 'docs', 'PLAN.md', 'README.md')
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Error "Missing required path: $path"
            }
          }
          Write-Host "Layout OK"

      - name: Check docs present
        shell: pwsh
        run: |
          if (-not (Test-Path 'docs/baseline-report.md')) {
            Write-Warning 'docs/baseline-report.md not found — add after Week 0 benchmark'
          }

  bootstrap-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: openchat-ai/yoyo-ide
          path: yoyo-ide

      - name: Bootstrap check (yoyo-ide submodule context)
        if: hashFiles('yoyo-ide/scripts/bootstrap-check.sh') != ''
        run: |
          cd yoyo-ide
          bash scripts/bootstrap-check.sh --strict --lock || echo "Bootstrap check skipped in yoyo-ai CI (run in yoyo-ide repo)"
